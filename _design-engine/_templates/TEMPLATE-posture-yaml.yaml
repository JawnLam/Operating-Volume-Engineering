  REQ-L2: { disposition: met, evidence: "", notes: "" }
  REQ-L3: { disposition: met, evidence: "", notes: "" }

  # Category M — Compounding Moat & Retention (T2; all moat items)
  REQ-M1: { disposition: met, evidence: "", notes: "" }
  REQ-M2: { disposition: met, evidence: "", notes: "" }
  REQ-M3: { disposition: met, evidence: "", notes: "" }
  REQ-M4: { disposition: met, evidence: "", notes: "" }
