# Standalone Sufficiency Posture — source of truth (Convention 10)
#
# This file is the per-OV registry of dispositions against the 47-requirement
# substrate at _design-engine/_meta/standalone-sufficiency/requirements.yaml.
# The OV's loyalty-retention-posture.md and vetting-rubric-filled.md are
# rendered from this file. C14 validator reads this file.
#
# Universal core fields (Convention 1) appear at top as YAML keys mirroring
# the markdown frontmatter convention.

type: Fleeting
Item_ID: <ov-slug>-posture
Title: "<OV Name> — Standalone Sufficiency Posture (source)"
Date_Added: YYYY-MM-DD
Date_Modified: YYYY-MM-DD
Needs_Processing: false

# --- OV identification ---
ov_name: "<OV Name>"
ov_slug: "<ov-slug>"

# --- Domain stakes ---
# "high" means regulated / safety / irreversible-decisions domain → 8 TG gates apply.
# "low" means the 8 TG conditional gates default to n-a (no justification needed).
domain_stakes: low   # low | high

# --- Convention 10 substrate revision this posture targets ---
convention_10_revision: "1.2"

# --- Moat commitments (≥1 required) ---
# Each commitment ties a moat REQ-ID to a concrete schema feature.
moat_commitments:
  - req_id: REQ-M2
    schema_feature: "<feature / type name / pointer that makes this moat real>"
  # - req_id: REQ-E4
  #   schema_feature: "..."
  # - req_id: REQ-M1
  #   schema_feature: "..."
  # - req_id: REQ-M3
  #   schema_feature: "..."
  # - req_id: REQ-M4
  #   schema_feature: "..."

# --- Per-requirement dispositions ---
# Each entry: disposition (met / partial / n-a / deferred), evidence pointer, optional notes.
# Disposition vocabulary:
#   met       — requirement is demonstrably met by this OV's design / artifacts.
#   partial   — requirement is partially met; explicit waiver in `notes` required for T0/TG gates.
#   n-a       — requirement does not apply (e.g., TG gates when domain_stakes: low; M4 in confidential domains).
#   deferred  — recognized gap; deferred to a future OV revision (T0/TG: requires waiver field).
#
# Optional waiver field: `waiver_reason: "explicit reason"` — required when a T0 or
# applicable-TG disposition is partial or deferred. Without a waiver, C14 fails.

requirements:
  # Category A — Foundational Parity & Scope Integrity (T0 hard gates)
  REQ-A1:
    disposition: met
    evidence: "<file path / design-decision reference>"
    notes: ""
  REQ-A2:
    disposition: met
    evidence: ""
    notes: ""
  REQ-A3:
    disposition: met
    evidence: ""
    notes: ""

  # Category B — Memory & Statefulness (B1 is T0; B2/B3 are T2)
  REQ-B1:
    disposition: met
    evidence: ""
    notes: ""
  REQ-B2:
    disposition: met
    evidence: ""
    notes: ""
  REQ-B3:
    disposition: met
    evidence: ""
    notes: ""

  # Category C — Workflow Orchestration & Guided Process (T1)
  REQ-C1: { disposition: met, evidence: "", notes: "" }
  REQ-C2: { disposition: met, evidence: "", notes: "" }
  REQ-C3: { disposition: met, evidence: "", notes: "" }
  REQ-C4: { disposition: met, evidence: "", notes: "" }

  # Category D — Proprietary Knowledge & Grounding (T1)
  REQ-D1: { disposition: met, evidence: "", notes: "" }
  REQ-D2: { disposition: met, evidence: "", notes: "" }
  REQ-D3: { disposition: met, evidence: "", notes: "" }
  REQ-D4: { disposition: met, evidence: "", notes: "" }

  # Category E — Integration, Action & Simulation (T1; E4 is moat)
  REQ-E1: { disposition: met, evidence: "", notes: "" }
  REQ-E2: { disposition: met, evidence: "", notes: "" }
  REQ-E3: { disposition: met, evidence: "", notes: "" }
  REQ-E4: { disposition: met, evidence: "", notes: "" }

  # Category F — Structured Deliverables & Artifacts (T1)
  REQ-F1: { disposition: met, evidence: "", notes: "" }
  REQ-F2: { disposition: met, evidence: "", notes: "" }
  REQ-F3: { disposition: met, evidence: "", notes: "" }

  # Category G — Personalization & Adaptive Tailoring (T2)
  REQ-G1: { disposition: met, evidence: "", notes: "" }
  REQ-G2: { disposition: met, evidence: "", notes: "" }
  REQ-G3: { disposition: met, evidence: "", notes: "" }

  # Category H — Proactivity & Lifecycle Management (H4 is T0; H1/H2/H3 are T2)
  REQ-H1: { disposition: met, evidence: "", notes: "" }
  REQ-H2: { disposition: met, evidence: "", notes: "" }
  REQ-H3: { disposition: met, evidence: "", notes: "" }
  REQ-H4:
    disposition: met
    evidence: "<file path showing the engineered first-win mechanism>"
    notes: ""

  # Category I — Trust, Safety, Accountability & Calibration (TG)
  REQ-I1: { disposition: met, evidence: "", notes: "" }
  REQ-I2: { disposition: met, evidence: "", notes: "" }
  REQ-I3: { disposition: met, evidence: "", notes: "" }
  REQ-I4: { disposition: met, evidence: "", notes: "" }
  REQ-I5: { disposition: met, evidence: "", notes: "" }

  # Category J — Outcome Orientation & Measurement (T2)
  # NOTE: REQ-J4 is reframed in OVE consumption as generic value-attribution
  # (is the OV delivering value vs a general LLM?) rather than the substrate's
  # commercial price-objection framing ("Why pay $100 when ChatGPT is $20?").
  # The substance is identical; only the framing differs. See README.md in
  # the substrate folder for the terminology seam.
  REQ-J1: { disposition: met, evidence: "", notes: "" }
  REQ-J2: { disposition: met, evidence: "", notes: "" }
  REQ-J3: { disposition: met, evidence: "", notes: "" }
  REQ-J4: { disposition: met, evidence: "", notes: "" }

  # Category K — Data Governance, Privacy & Ownership (TG)
  REQ-K1: { disposition: met, evidence: "", notes: "" }
