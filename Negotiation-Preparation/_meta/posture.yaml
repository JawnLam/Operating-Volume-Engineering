# Standalone Sufficiency Posture — source of truth (Convention 10)
# OV: Negotiation-Preparation (high-stakes, episodic-with-deadline)
# Substrate: _design-engine/_meta/standalone-sufficiency/ (rev 1.2)

Item_Prototype: Fleeting
Item_ID: negotiation-prep-posture
Title: "Negotiation-Preparation — Standalone Sufficiency Posture (source)"
Date_Added: 2026-06-14
Date_Modified: 2026-06-14
Needs_Processing: false

ov_name: "Negotiation-Preparation"
ov_slug: "negotiation-prep"
domain_stakes: high
convention_10_revision: "1.2"

# Two moat commitments — REQ-E4 (wargame counterfactual simulation against the
# user's actual stakeholder map) and REQ-M2 (accumulated negotiation library
# becomes the operator's professional/personal system of record).
moat_commitments:
  - req_id: REQ-E4
    schema_feature: "Wargame role-play protocol in _ov-manifest.md §6 — simulates counter-party responses against this negotiation's stakeholder map, BATNA, and concession plan; produces a quantified 'where it likely lands' projection traceable to Fisher/Ury/Voss methodology."
  - req_id: REQ-M2
    schema_feature: "Per-cartridge prep document + post-mortem document (one cartridge per named negotiation) accumulates into a queryable library of patterns across all of the operator's negotiations — counter-party types, concession sequences, surprises that recurred. Leaving the OV forfeits the library."

requirements:
  # Category A — Foundational Parity & Scope Integrity (T0)
  REQ-A1:
    disposition: met
    evidence: "Engine prose + structured intake produces negotiation analysis as substantive as a frontier general model would on the same query."
    notes: ""
  REQ-A2:
    disposition: met
    evidence: "_ov-manifest.md §scope-boundaries explicitly handles adjacent topics gracefully (e.g., explanatory questions about negotiation theory get answered, not refused)."
    notes: ""
  REQ-A3:
    disposition: met
    evidence: "Operator may always ask a direct question of the AI and receive a direct answer — the structured intake is offered, not imposed."
    notes: ""

  # Category B — Memory & Statefulness (B1 T0; B2/B3 T2)
  REQ-B1:
    disposition: met
    evidence: "Each negotiation cartridge has state files (`_state.md` per cartridge) holding stakeholder map, BATNA, concession plan, opening anchor, wargame notes. Bootstrap reads them every session."
    notes: ""
  REQ-B2:
    disposition: met
    evidence: "Post-mortem from each negotiation references prior negotiations in the operator's library when patterns recur."
    notes: ""
  REQ-B3:
    disposition: met
    evidence: "The negotiation library appreciates: as the operator runs more cartridges, the cross-cartridge pattern library (counter-party types, concession sequences, surprises) becomes more valuable. See REQ-M2 schema feature."
    notes: ""

  # Category C — Workflow Orchestration & Guided Process (T1)
  REQ-C1:
    disposition: met
    evidence: "Structured 7-step intake (stakeholder mapping → BATNA → issue analysis → opening → concessions → wargame → post-mortem) walks the operator through expert-grade prep without requiring them to know how to prompt."
    notes: ""
  REQ-C2:
    disposition: met
    evidence: "The 7-step process chains end-to-end from a single initiation."
    notes: ""
  REQ-C3:
    disposition: met
    evidence: "Per-cartridge state file tracks which step is complete; AI reports current stage and next action on every session start."
    notes: ""
  REQ-C4:
    disposition: met
    evidence: "Opinionated default: stakeholder map first, BATNA second, issue analysis third. Operator can override but the path eliminates the blank page."
    notes: ""

  # Category D — Proprietary Knowledge & Grounding (T1)
  REQ-D1:
    disposition: partial
    evidence: "Engine references Fisher/Ury, Diamond, Voss, Raiffa methodology as substrate; not a formal RAG corpus but the substrate is curated by the engine author."
    notes: "Could be strengthened with an explicit curated negotiation-case corpus in future revisions."
  REQ-D2:
    disposition: n-a
    evidence: "Negotiation theory does not have fast-moving facts; the prior-art methodology is stable. No freshness gate applicable."
    notes: ""
  REQ-D3:
    disposition: partial
    evidence: "When the OV invokes a named technique (BATNA, ZOPA, tactical empathy), the prior-art source is named. Not every output line carries a citation."
    notes: ""
  REQ-D4:
    disposition: met
    evidence: "_ov-manifest.md §scope-boundaries — hard stops on legal advice, therapy, manipulation toolkit. The OV abstains and routes to the appropriate professional rather than fabricating."
    notes: ""

  # Category E — Integration, Action & Simulation (T1; E4 is moat)
  REQ-E1:
    disposition: n-a
    evidence: "v1 of this OV doesn't connect to external systems — negotiations don't have a structured-data system-of-record in most operator workflows."
    notes: "Could change in v2 if integrations with CRM or calendar systems emerge as natural."
  REQ-E2:
    disposition: met
    evidence: "The OV produces a finished prep document + post-mortem document per cartridge — concrete artifacts, not advice text the operator must compose themselves."
    notes: ""
  REQ-E3:
    disposition: partial
    evidence: "Post-mortem feeds the next prep cycle when the operator returns; not automated closed-loop in v1."
    notes: ""
  REQ-E4:
    disposition: met
    evidence: "MOAT COMMITMENT. Wargame role-play (step 6 of the 7-step process) simulates plausible counter-party responses against this negotiation's stakeholder map / BATNA / concession plan, producing a quantified projection traceable to the named methodology. Cannot be reproduced by a 10-min prompt because the simulation rests on accumulated cartridge state."
    notes: ""

  # Category F — Structured Deliverables & Artifacts (T1)
  REQ-F1:
    disposition: met
    evidence: "Prep document (stakeholder map + BATNA + opening + concession plan + wargame) and post-mortem document are the canonical deliverables of every cartridge."
    notes: ""
  REQ-F2:
    disposition: met
    evidence: "Templates ensure every cartridge ships in the same structural shape."
    notes: ""
  REQ-F3:
    disposition: met
    evidence: "Markdown files. Export to PDF/CSV is trivial; the operator already owns the source."
    notes: ""

  # Category G — Personalization & Adaptive Tailoring (T2)
  REQ-G1:
    disposition: met
    evidence: "Every output is constrained to THIS negotiation's parties, ZOPA, and operator-specific BATNA. No generic advice."
    notes: ""
  REQ-G2:
    disposition: met
    evidence: "Post-mortem informs the next prep — patterns the operator has seen recur are surfaced as relevant during the next negotiation's prep."
    notes: ""
  REQ-G3:
    disposition: partial
    evidence: "OV adapts to the operator's preferred negotiation style (collaborative vs distributive lean) over time, but no formal preference model in v1."
    notes: ""

  # Category H — Proactivity & Lifecycle Management (H4 T0; H1/H2/H3 T2)
  REQ-H1:
    disposition: partial
    evidence: "OV relies on operator-initiated sessions in v1; doesn't proactively schedule check-ins against negotiation timeline."
    notes: ""
  REQ-H2:
    disposition: met
    evidence: "OV surfaces relevant patterns from prior cartridges when current negotiation's stakeholder profile matches a prior case (e.g., 'last year's vendor negotiation with similar counterparty type stalled at X — consider Y')."
    notes: ""
  REQ-H3:
    disposition: met
    evidence: "Each cartridge tracks the live-conversation date as a deadline; prep cadence is structured around it."
    notes: ""
  REQ-H4:
    disposition: met
    evidence: "Session 1 produces the opening-version prep document (stakeholder map + initial BATNA assessment). That is the engineered first win — within the first session, not the first week."
    notes: ""

  # Category I — Trust, Safety, Accountability & Calibration (TG)
  REQ-I1:
    disposition: met
    evidence: "Methodology is explicit; the OV signals uncertainty when stakes are high (e.g., 'this BATNA estimate assumes X, which you should verify with counsel')."
    notes: ""
  REQ-I2:
    disposition: met
    evidence: "_ov-manifest.md §scope-boundaries: hard stops on legal advice, therapy, manipulation toolkit. Known-bad inputs (e.g., 'help me deceive the counter-party') are caught and refused."
    notes: ""
  REQ-I3:
    disposition: met
    evidence: "OV routes to lawyer for legal exposure, therapist for relational stakes, mediator for high-conflict. Escalation triggers are explicit in the manifest."
    notes: ""
  REQ-I4:
    disposition: met
    evidence: "Prep doc traces every recommendation to the methodology (Fisher/Ury BATNA logic, Voss tactical empathy, etc.). Reasoning trail exists for material decisions."
    notes: ""
  REQ-I5:
    disposition: met
    evidence: "Named methodology (Fisher/Ury, Diamond, Voss, Raiffa) stands behind the output. The OV is not a faceless aggregator."
    notes: ""

  # Category J — Outcome Orientation & Measurement (T2)
  # REQ-J4 is consumed in OVE as generic value attribution, NOT the substrate's
  # commercial price-objection framing. The question for non-commercial OVs:
  # is this delivering value vs a general LLM?
  REQ-J1:
    disposition: met
    evidence: "Each cartridge opens with explicit objective declaration (e.g., 'salary $X with Y benefits; minimum acceptable $Z')."
    notes: ""
  REQ-J2:
    disposition: met
    evidence: "Prep progress checklist tracks completion of the 7 steps."
    notes: ""
  REQ-J3:
    disposition: met
    evidence: "Post-mortem holds the OV to the negotiated outcome vs the objective — not to whether the conversation 'felt productive.'"
    notes: ""
  REQ-J4:
    disposition: partial
    evidence: "Post-mortem surfaces lessons + patterns. No formal value-attribution metering in v1 (e.g., 'this OV saved you X hours of prep time'); informal value sense via post-mortem."
    notes: ""

  # Category K — Data Governance, Privacy & Ownership (TG)
  REQ-K1:
    disposition: met
    evidence: "Files-on-disk model (Convention 8 Operator-Private Zone) means negotiation data stays local with the operator. Demonstrably exceeds base API default (typed into ChatGPT, conversation lives on vendor servers)."
    notes: ""
  REQ-K2:
    disposition: met
    evidence: "Markdown files on disk; operator owns, can export or delete on demand. No vendor lock."
    notes: ""
  REQ-K3:
    disposition: met
    evidence: "Negotiation prep is not a regulated profession; OV deflects legal-advice / therapy domains to licensed professionals (REQ-I3). No HIPAA/FERPA/financial-regs apply at the OV layer."
    notes: ""

  # Category L — Reliability, Consistency & Methodological Integrity (T2)
  REQ-L1:
    disposition: met
    evidence: "Same engine + same template per cartridge ensures consistent-quality output per negotiation."
    notes: ""
  REQ-L2:
    disposition: met
    evidence: "Fisher/Ury/Diamond/Voss/Raiffa methodology is named and applied consistently."
    notes: ""
  REQ-L3:
    disposition: met
    evidence: "Engine ships with VERSION.md; methodology revisions land via versioned engine updates."
    notes: ""

  # Category M — Compounding Moat & Retention (T2; all moat items)
  REQ-M1:
    disposition: deferred
    evidence: "Data flywheel deferred: requires anonymized cross-operator outcome data which v1 does not collect."
    notes: ""
  REQ-M2:
    disposition: met
    evidence: "MOAT COMMITMENT. Accumulated negotiation library + post-mortems become the operator's system of record for their negotiation practice. Leaving the OV forfeits real, accumulated value — the patterns observed over years of negotiations don't transfer to a fresh general-LLM chat."
    notes: ""
  REQ-M3:
    disposition: met
    evidence: "Core value rests on accumulated cartridge state (proprietary by definition) + named methodology + structured deliverables — none of which is promptable behavior the platform can ship natively."
    notes: ""
  REQ-M4:
    disposition: n-a
    evidence: "Negotiations are typically confidential; gated cohort with peer benchmarks would create competitive/confidentiality conflicts. Domain-inappropriate per substrate §15 M4 caveat."
    notes: ""
