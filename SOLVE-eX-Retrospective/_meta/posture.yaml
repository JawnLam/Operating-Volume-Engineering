# Standalone Sufficiency Posture — source of truth (Convention 10)
# OV: SOLVE-eX (high-stakes structured decision-making + problem-solving)
# Substrate: _design-engine/_meta/standalone-sufficiency/ (rev 1.2)
# Retrospective: SOLVE-eX shipped publicly as v2.1.0 at github.com/JawnLam/SOLVE-eX

Item_Prototype: Fleeting
Item_ID: solve-ex-posture
Title: "SOLVE-eX — Standalone Sufficiency Posture (source)"
Date_Added: 2026-06-14
Date_Modified: 2026-06-14
Needs_Processing: false

ov_name: "SOLVE-eX"
ov_slug: "solve-ex"
domain_stakes: high
convention_10_revision: "1.2"

# Three moat commitments — REQ-E4 (methodology-bounded application of thinking tools
# against the operator's actual case-file state), REQ-M2 (case files accumulate as
# the operator's system of record for high-stakes decisions), REQ-M3 (the 677-entry
# tool corpus + 14-chapter methodology rests on proprietary curation, not
# promptable behavior).
moat_commitments:
  - req_id: REQ-E4
    schema_feature: "21-step process framework applied to a Case File runs methodology-bounded thinking-tool applications against the user's actual situation (problem context, decision criteria, prior reasoning). Output is a quantified next-action recommendation traceable to the tool entry that produced it."
  - req_id: REQ-M2
    schema_feature: "Per-case-file accumulated state (problem context, tools applied, conclusions, action plan) becomes the operator's system of record for their decision-making practice. Leaving the OV forfeits the case-file library."
  - req_id: REQ-M3
    schema_feature: "Core value rests on the 677-entry curated thinking-tool corpus + 14-chapter methodology + 21-step process framework + 5 operational personas with switching rules. None of this is promptable behavior the platform can ship natively in 12 months."

requirements:
  # Category A — Foundational Parity & Scope Integrity (T0)
  REQ-A1:
    disposition: met
    evidence: "Engine prose (14 instruction chapters) + 5 personas + 21-step process produce decision-analysis output substantively equivalent to a general LLM on overlapping queries — and typically better on structured-thinking queries because the tool corpus is invoked."
    notes: ""
  REQ-A2:
    disposition: met
    evidence: "Engine handles adjacent topics gracefully (e.g., 'I need a quick gut-check on X' gets a useful answer, not refusal). Personas switch rules permit informal engagement when the situation doesn't warrant the full 21-step process."
    notes: ""
  REQ-A3:
    disposition: met
    evidence: "Operator may bypass the 21-step process and ask direct questions; the persona switching rules explicitly permit informal engagement."
    notes: ""

  # Category B — Memory & Statefulness
  REQ-B1:
    disposition: met
    evidence: "Each Case File is a persistent state file holding problem context, decision criteria, tools applied, conclusions, action plan. Bootstrap re-reads on every session."
    notes: ""
  REQ-B2:
    disposition: met
    evidence: "Cross-case-file pattern surfacing: 'last quarter's X decision used similar criteria — here's what worked.'"
    notes: ""
  REQ-B3:
    disposition: met
    evidence: "Case file library appreciates: the operator's accumulated problem-solving record across cases becomes increasingly valuable as a referenceable corpus."
    notes: ""

  # Category C — Workflow Orchestration & Guided Process
  REQ-C1:
    disposition: met
    evidence: "21-step process framework + 14-chapter operating manual walks the operator through expert-grade decision analysis without requiring them to know which tool to apply when. Question banks indexed by phase-step."
    notes: ""
  REQ-C2:
    disposition: met
    evidence: "21-step process chains end-to-end from problem framing through action plan."
    notes: ""
  REQ-C3:
    disposition: met
    evidence: "Case file tracks current phase + step; AI reports stage and next action."
    notes: ""
  REQ-C4:
    disposition: met
    evidence: "Opinionated default: phase 1 (problem framing) before phase 2 (criteria), etc. Operator can override."
    notes: ""

  # Category D — Proprietary Knowledge & Grounding
  REQ-D1:
    disposition: met
    evidence: "677-entry curated thinking-tool corpus IS the RAG corpus — non-public curation, not internet averages."
    notes: ""
  REQ-D2:
    disposition: partial
    evidence: "Methodology evolves via versioned engine releases (v1.0 → v2.1.0). No automated freshness cadence; rev happens on engine ship."
    notes: ""
  REQ-D3:
    disposition: met
    evidence: "Each tool application traces to the specific tool entry in the corpus. Citation pattern preserved through the 21-step process."
    notes: ""
  REQ-D4:
    disposition: met
    evidence: "Engine includes hard guardrails: refuses unsafe guidance, escalates to professional domains (legal/medical/financial) when out of scope. Fabrication discipline (P8 of OVE) applies."
    notes: ""

  # Category E — Integration, Action & Simulation (E4 is moat)
  REQ-E1:
    disposition: n-a
    evidence: "v2.1.0 doesn't connect to external systems-of-record. Case files are the system-of-record themselves."
    notes: ""
  REQ-E2:
    disposition: met
    evidence: "Case file produces a concrete action plan — not advice prose. Operator takes the action plan into the world."
    notes: ""
  REQ-E3:
    disposition: partial
    evidence: "Action plan outcomes can be logged back into the case file (manually); no automated outcome ingestion in v2.1.0."
    notes: ""
  REQ-E4:
    disposition: met
    evidence: "MOAT COMMITMENT. 21-step process applied to the case file runs methodology-bounded thinking-tool applications against the operator's actual situation. Quantified next-action recommendation traceable to the specific tool entry that produced it. Cannot be reproduced by 10-min prompt — the simulation rests on the curated 677-entry tool corpus + case-file state."
    notes: ""

  # Category F — Structured Deliverables & Artifacts
  REQ-F1:
    disposition: met
    evidence: "Case file IS the deliverable. Structured: problem framing + criteria + tools applied + conclusions + action plan."
    notes: ""
  REQ-F2:
    disposition: met
    evidence: "Templates ensure every case file has identical structural shape."
    notes: ""
  REQ-F3:
    disposition: met
    evidence: "Markdown files. Export to PDF/CSV trivial. Operator owns the source."
    notes: ""

  # Category G — Personalization & Adaptive Tailoring
  REQ-G1:
    disposition: met
    evidence: "Every output constrained to THIS case file's problem context, decision criteria, prior reasoning."
    notes: ""
  REQ-G2:
    disposition: met
    evidence: "Outcome logging in prior case files informs current case-file's tool selection (e.g., 'when you've faced similar criteria before, tool X worked better than tool Y')."
    notes: ""
  REQ-G3:
    disposition: partial
    evidence: "Adapts to operator's decision style preferences over time; no formal preference model."
    notes: ""

  # Category H — Proactivity & Lifecycle Management
  REQ-H1:
    disposition: partial
    evidence: "Operator-initiated sessions in v2.1.0. No automated check-in cadence."
    notes: ""
  REQ-H2:
    disposition: met
    evidence: "Cross-case pattern surfacing: 'this looks like decision-X from Q1' or 'similar criteria to your previous case Y' fires unprompted."
    notes: ""
  REQ-H3:
    disposition: met
    evidence: "Case files track decision deadlines (e.g., 'must commit by date X')."
    notes: ""
  REQ-H4:
    disposition: met
    evidence: "Session 1 produces the framed problem + initial tool-application set. That's the engineered first win."
    notes: ""

  # Category I — Trust, Safety, Accountability & Calibration (TG)
  REQ-I1:
    disposition: met
    evidence: "Engine explicitly signals uncertainty proportionate to stakes. Decision-tree outcomes carry confidence bands."
    notes: ""
  REQ-I2:
    disposition: met
    evidence: "Hard stops on medical / legal / financial / safety advice. Routes to licensed professionals. Refuses obviously unsafe guidance."
    notes: ""
  REQ-I3:
    disposition: met
    evidence: "5 operational personas include explicit escalation rules — when to invoke the 'External Expert Switch' persona to route to lawyer/doctor/CPA/etc."
    notes: ""
  REQ-I4:
    disposition: met
    evidence: "Case file IS the auditable record. Every conclusion traces to the tool that produced it; every tool traces to the specific entry in the 677-entry corpus."
    notes: ""
  REQ-I5:
    disposition: met
    evidence: "Methodology has named curators + the corpus has named tool authors. Accountable point of view ships with the OV."
    notes: ""

  # Category J — Outcome Orientation & Measurement
  REQ-J1:
    disposition: met
    evidence: "Phase 1 of 21-step process is explicit problem framing → decision criteria. Each case file opens with declared objective."
    notes: ""
  REQ-J2:
    disposition: met
    evidence: "Case file tracks progress through the 21-step process; 5-persona model includes status reporting."
    notes: ""
  REQ-J3:
    disposition: met
    evidence: "Outcome logging (manual in v2.1.0) holds the OV accountable to actual decision outcomes, not just process completion."
    notes: ""
  REQ-J4:
    disposition: partial
    evidence: "Action-plan outcomes feed into post-decision logs. No formal value-attribution metering (e.g., 'this OV saved you X hours of analysis time vs general LLM')."
    notes: ""

  # Category K — Data Governance, Privacy & Ownership (TG)
  REQ-K1:
    disposition: met
    evidence: "Files-on-disk (OVE Convention 8 Operator-Private Zone). Decision data stays local. Demonstrably exceeds base API default."
    notes: ""
  REQ-K2:
    disposition: met
    evidence: "Markdown files. Operator owns, exports, deletes on demand. No vendor lock."
    notes: ""
  REQ-K3:
    disposition: met
    evidence: "Structured decision-making isn't a regulated profession at the OV layer. OV deflects regulated-profession queries to licensed pros (REQ-I3)."
    notes: ""

  # Category L — Reliability, Consistency & Methodological Integrity
  REQ-L1:
    disposition: met
    evidence: "Same 14-chapter engine + 677-entry corpus + 21-step process per case file ensures consistent-quality output."
    notes: ""
  REQ-L2:
    disposition: met
    evidence: "Named SOLVE-eX methodology applied consistently across all cases."
    notes: ""
  REQ-L3:
    disposition: met
    evidence: "v2.1.0 ships VERSION.md. Methodology revisions land via versioned engine releases."
    notes: ""

  # Category M — Compounding Moat & Retention (all moat items)
  REQ-M1:
    disposition: deferred
    evidence: "Data flywheel deferred: requires anonymized cross-operator outcome data which v2.1.0 doesn't aggregate."
    notes: ""
  REQ-M2:
    disposition: met
    evidence: "MOAT COMMITMENT. Case file library accumulates into operator's professional system of record for structured decision-making. Leaving the OV forfeits real, accumulated value."
    notes: ""
  REQ-M3:
    disposition: met
    evidence: "MOAT COMMITMENT. Core value rests on the 677-entry curated thinking-tool corpus + 14-chapter methodology + 21-step process — proprietary curation, not promptable behavior."
    notes: ""
  REQ-M4:
    disposition: n-a
    evidence: "Structured decision-making frequently involves confidential business context; gated cohort with peer benchmarks creates confidentiality conflicts. Domain-inappropriate per substrate §15 caveat."
    notes: ""
